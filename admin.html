<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 페이지 — 온돌컴퍼니</title>
<link rel="icon" type="image/png" href="assets/emblem.png">
<link rel="stylesheet" href="assets/ondol.css">
<style>
body {
  background: var(--ink);
  color: var(--txt-on-dark);
}
.admin-shell {
  max-width: 1180px;
  margin: 0 auto;
  padding: 56px 28px 96px;
}
.admin-card {
  background: rgba(252, 248, 241, 0.96);
  color: var(--txt-on-light);
  border: 1px solid var(--paper-line);
  border-radius: 24px;
  padding: 36px;
  box-shadow: 0 18px 60px rgba(23, 18, 16, 0.12);
}
.admin-card h1 {
  font-family: var(--serif-kr);
  font-size: 34px;
  font-weight: 700;
  margin-bottom: 8px;
}
.admin-card .lead {
  color: var(--txt-light-muted);
  margin-bottom: 24px;
}
.login-box {
  display: flex;
  flex-direction: column;
  gap: 12px;
  max-width: 360px;
  padding: 20px;
  border: 1px solid var(--paper-line);
  border-radius: 16px;
  background: var(--paper);
}
.login-box label {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.04em;
  color: var(--txt-light-muted);
}
.login-box input {
  width: 100%;
  border: 1px solid var(--paper-line);
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 15px;
}
.login-box .hint {
  font-size: 13px;
  color: var(--txt-light-muted);
}
.toolbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  margin-bottom: 18px;
}
.toolbar .meta {
  color: var(--txt-light-muted);
  font-size: 14px;
}
.stats {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 14px;
  margin-bottom: 18px;
}
.stat {
  border: 1px solid var(--paper-line);
  border-radius: 14px;
  padding: 14px 16px;
  background: var(--paper);
}
.stat .label {
  font-size: 12px;
  color: var(--txt-light-muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.stat .value {
  font-family: var(--serif-en);
  font-size: 22px;
  margin-top: 6px;
}
.table-wrap {
  overflow-x: auto;
}
table {
  width: 100%;
  border-collapse: collapse;
  min-width: 760px;
}
th, td {
  padding: 14px 12px;
  border-bottom: 1px solid var(--paper-line);
  text-align: left;
  vertical-align: top;
}
th {
  font-size: 12px;
  letter-spacing: 0.08em;
  color: var(--txt-light-muted);
  text-transform: uppercase;
}
.status-pill {
  display: inline-flex;
  align-items: center;
  padding: 6px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 700;
  background: rgba(23, 18, 16, 0.06);
}
.status-select {
  padding: 8px 10px;
  border-radius: 8px;
  border: 1px solid var(--paper-line);
  background: white;
}
.empty {
  padding: 24px 0;
  color: var(--txt-light-muted);
}
@media (max-width: 720px) {
  .admin-card { padding: 24px; }
  .stats { grid-template-columns: 1fr; }
  .toolbar { flex-direction: column; align-items: flex-start; }
}
</style>
</head>
<body>
<nav class="nav" data-screen-label="내비게이션">
  <div class="nav-inner">
    <a class="nav-brand" href="index.html">
      <img src="assets/emblem.png" alt="온돌컴퍼니 엠블럼">
      <span>ONDOL COMPANY</span>
    </a>
    <div class="nav-links">
      <a href="index.html">메인</a>
      <a href="portfolio.html">포트폴리오</a>
      <a class="nav-cta" href="index.html#contact">문의하기</a>
    </div>
  </div>
</nav>

<main class="admin-shell">
  <section class="admin-card">
    <h1>상담 신청 관리</h1>
    <p class="lead">Supabase에 저장된 상담 신청을 확인하고 처리 상태를 변경할 수 있습니다.</p>

    <div id="loginBox" class="login-box">
      <label for="adminPassword">관리자 비밀번호</label>
      <input id="adminPassword" type="password" placeholder="비밀번호를 입력하세요">
      <button class="btn btn-flame" id="loginBtn" type="button">로그인</button>
      <p class="hint">기본 비밀번호: ondol-admin-2026</p>
    </div>

    <div id="adminContent" style="display:none;">
      <div class="toolbar">
        <div class="meta" id="statusText">로딩 중입니다...</div>
        <button class="btn btn-ghost" id="logoutBtn" type="button">로그아웃</button>
      </div>

      <div class="stats">
        <div class="stat"><div class="label">총 신청</div><div class="value" id="countTotal">0</div></div>
        <div class="stat"><div class="label">대기중</div><div class="value" id="countPending">0</div></div>
        <div class="stat"><div class="label">완료</div><div class="value" id="countDone">0</div></div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>이름</th>
              <th>이메일</th>
              <th>연락처</th>
              <th>현재 상황</th>
              <th>원하는 결과</th>
              <th>상태</th>
              <th>접수일</th>
            </tr>
          </thead>
          <tbody id="consultationRows"></tbody>
        </table>
      </div>
    </div>
  </section>
</main>

<script>
const ADMIN_PASSWORD = 'ondol-admin-2026';
const SUPABASE_URL = localStorage.getItem('ondolSupabaseUrl') || 'https://pnimnighseyqbuverztd.supabase.co';
const SUPABASE_ANON_KEY = localStorage.getItem('ondolSupabaseAnonKey') || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBuaW1uaWdoc2V5cWJ1dmVyenRkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2NzgyNzQsImV4cCI6MjA5OTI1NDI3NH0.oh3weN8T7eI70LyxlNyHE4aTw6EGlIKuG5lgExi-s6Y';

const loginBox = document.getElementById('loginBox');
const adminContent = document.getElementById('adminContent');
const loginBtn = document.getElementById('loginBtn');
const logoutBtn = document.getElementById('logoutBtn');
const adminPasswordInput = document.getElementById('adminPassword');
const statusText = document.getElementById('statusText');
const consultationRows = document.getElementById('consultationRows');
const countTotal = document.getElementById('countTotal');
const countPending = document.getElementById('countPending');
const countDone = document.getElementById('countDone');

function escapeHtml(value) {
  return String(value || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/\"/g, '&quot;');
}

function formatDate(value) {
  if (!value) return '-';
  const date = new Date(value);
  return isNaN(date) ? '-' : date.toLocaleString('ko-KR');
}

function showLogin() {
  loginBox.style.display = 'flex';
  adminContent.style.display = 'none';
}

function showAdmin() {
  loginBox.style.display = 'none';
  adminContent.style.display = 'block';
}

function setStatus(message) {
  statusText.textContent = message;
}

function renderRows(rows) {
  consultationRows.innerHTML = '';
  if (!rows.length) {
    consultationRows.innerHTML = '<tr><td colspan="7" class="empty">등록된 상담 신청이 없습니다.</td></tr>';
    countTotal.textContent = '0';
    countPending.textContent = '0';
    countDone.textContent = '0';
    return;
  }

  countTotal.textContent = rows.length;
  countPending.textContent = rows.filter(function (item) { return item.status !== 'done'; }).length;
  countDone.textContent = rows.filter(function (item) { return item.status === 'done'; }).length;

  rows.forEach(function (row) {
    const tr = document.createElement('tr');
    tr.innerHTML = [
      '<td>' + escapeHtml(row.name) + '</td>',
      '<td>' + escapeHtml(row.email) + '</td>',
      '<td>' + escapeHtml(row.phone || '-') + '</td>',
      '<td>' + escapeHtml(row.situation || '-') + '</td>',
      '<td>' + escapeHtml(row.goal || row.message || '-') + '</td>',
      '<td><select class="status-select" data-id="' + row.id + '">\n' +
        '<option value="pending"' + (row.status === 'pending' ? ' selected' : '') + '>대기중</option>' +
        '<option value="in_progress"' + (row.status === 'in_progress' ? ' selected' : '') + '>진행중</option>' +
        '<option value="done"' + (row.status === 'done' ? ' selected' : '') + '>완료</option>' +
        '</select></td>',
      '<td>' + formatDate(row.created_at) + '</td>'
    ].join('');
    consultationRows.appendChild(tr);
  });

  consultationRows.querySelectorAll('.status-select').forEach(function (select) {
    select.addEventListener('change', function () {
      updateStatus(this.getAttribute('data-id'), this.value);
    });
  });
}

async function loadConsultations() {
  setStatus('상담 신청을 불러오는 중입니다...');

  try {
    const response = await fetch(SUPABASE_URL + '/rest/v1/consultations?select=*&order=created_at.desc', {
      headers: {
        apikey: SUPABASE_ANON_KEY,
        Authorization: 'Bearer ' + SUPABASE_ANON_KEY,
        'Content-Type': 'application/json'
      }
    });

    if (!response.ok) {
      const errorText = await response.text();
      setStatus('불러오기에 실패했습니다: ' + errorText);
      return;
    }

    const data = await response.json();
    renderRows(data || []);
    setStatus('상담 신청 ' + (data || []).length + '건을 불러왔습니다.');
  } catch (error) {
    setStatus('불러오기에 실패했습니다: ' + error.message);
  }
}

async function updateStatus(id, status) {
  try {
    const response = await fetch(SUPABASE_URL + '/rest/v1/consultations?id=eq.' + id, {
      method: 'PATCH',
      headers: {
        apikey: SUPABASE_ANON_KEY,
        Authorization: 'Bearer ' + SUPABASE_ANON_KEY,
        'Content-Type': 'application/json',
        Prefer: 'return=representation'
      },
      body: JSON.stringify({ status: status })
    });

    if (!response.ok) {
      const errorText = await response.text();
      setStatus('상태 변경에 실패했습니다: ' + errorText);
      return;
    }

    setStatus('상태를 변경했습니다.');
    loadConsultations();
  } catch (error) {
    setStatus('상태 변경에 실패했습니다: ' + error.message);
  }
}

function login() {
  const password = adminPasswordInput.value.trim();
  if (!password) {
    setStatus('비밀번호를 입력해주세요.');
    return;
  }

  if (password !== ADMIN_PASSWORD) {
    setStatus('비밀번호가 올바르지 않습니다.');
    return;
  }

  localStorage.setItem('ondolAdminPassword', password);
  sessionStorage.setItem('ondolAdminAuthenticated', 'true');
  showAdmin();
  loadConsultations();
}

function logout() {
  sessionStorage.removeItem('ondolAdminAuthenticated');
  adminPasswordInput.value = '';
  showLogin();
  setStatus('로그아웃되었습니다.');
}

loginBtn.addEventListener('click', login);
logoutBtn.addEventListener('click', logout);
adminPasswordInput.addEventListener('keydown', function (event) {
  if (event.key === 'Enter') {
    event.preventDefault();
    login();
  }
});

window.addEventListener('DOMContentLoaded', function () {
  if (sessionStorage.getItem('ondolAdminAuthenticated') === 'true' || localStorage.getItem('ondolAdminPassword') === ADMIN_PASSWORD) {
    showAdmin();
    loadConsultations();
  } else {
    showLogin();
    setStatus('관리자 비밀번호를 입력하세요.');
  }
});
</script>
</body>
</html>
